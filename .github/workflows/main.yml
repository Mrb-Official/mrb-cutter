name: Build Auto Reel Maker APK

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      # Ab yeh FAST Debug APK banayega
      - name: Build Debug APK
        run: flutter build apk --debug

      # Debug APK ko hi upload karega
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mrb-cutter-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
