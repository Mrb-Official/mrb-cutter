name: mrb_cutter
description: "MRB Cutter Pro Reel Maker App"
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  file_picker: ^8.0.0
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  ffmpeg_kit_flutter_full_gpl: ^6.0.3
  open_file: ^3.3.2
  dynamic_color: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.6
  change_app_package_name: ^1.5.0

# 2. Icon generate karne ki settings yahan hai
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.jpg"  # <-- YAHAN CHANGE KIYA HAI (.png se .jpg)

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpg


flutter_native_splash:
  color: "#000000" # Black background (teri dark theme ke hisaab se)
  image: "assets/logo.jpg" # Tera logo path
  android_12:
    color: "#000000"
    image: "assets/logo.jpg"
